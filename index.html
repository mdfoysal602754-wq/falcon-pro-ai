<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falcon Pro AI</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#090015;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:400px;
    background:#120022;
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 20px #8a2be2;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:0 auto 20px;
    box-shadow:0 0 25px #b100ff;
}

h1{
    text-align:center;
    font-size:42px;
    margin:10px 0;
    text-shadow:0 0 15px #c84cff;
}

.subtitle{
    text-align:center;
    color:#00d9ff;
    margin-bottom:30px;
    font-size:18px;
}

label{
    color:#00d9ff;
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border-radius:15px;
    border:2px solid #6f00ff;
    background:#070010;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#8a00ff,#d24dff);
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #c84cff;
}

button:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<div class="container">
    <img src="https://via.placeholder.com/120" class="logo">

    <h1>FALCON<br>PRO AI</h1>

    <div class="subtitle">PREMIUM AI TERMINAL</div>

    <label>OPERATOR ID</label>
    <input type="text" placeholder="Enter Username">

    <label>SECURITY KEY</label>
    <input type="password" placeholder="Enter Password">

    <button>INITIALIZE LINK</button>
</div>

</body>
</html>
